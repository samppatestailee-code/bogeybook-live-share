<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BogeyBook Live Round</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1713;
        --card: #18221d;
        --card-border: rgba(255, 255, 255, 0.06);
        --text: #f3f5f4;
        --muted: #a7b3ac;
        --accent: #9fd4b6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(159, 212, 182, 0.14), transparent 35%),
          linear-gradient(180deg, #101713 0%, #0d1410 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 22px;
        padding: 18px;
        margin-bottom: 14px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      }
      .hero-top,
      .summary-grid {
        display: grid;
        gap: 12px;
      }
      .hero-top {
        grid-template-columns: 1fr auto;
        align-items: start;
      }
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .eyebrow, .label, .section-header p {
        margin: 0 0 6px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      h1, h2, .value, .course, .message {
        margin: 0;
      }
      h1 {
        font-size: clamp(28px, 7vw, 38px);
        line-height: 1.05;
      }
      h2 {
        font-size: 20px;
      }
      .course {
        margin-top: 8px;
        color: var(--muted);
        font-size: 16px;
      }
      .message {
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.5;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        border-radius: 999px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }
      .value {
        font-size: 22px;
        font-weight: 700;
      }
      .section-header {
        margin-bottom: 12px;
      }
      .scorecard {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
      }
      .scorecard th,
      .scorecard td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .scorecard th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .scorecard tbody tr:last-child td {
        border-bottom: none;
      }
      .hole-row.current {
        background: rgba(159, 212, 182, 0.10);
      }
      .loading {
        color: var(--muted);
      }
      .message-card p,
      .loading {
        margin: 0;
        line-height: 1.5;
      }
      @media (max-width: 640px) {
        .hero-top,
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app" class="card loading">Loading round...</div>
    </main>
    <script>
      const snapshotURL =
        "https://yrhmhmcugqbqimxsccru.supabase.co/functions/v1/live-round-snapshot";
      const token = new URL(window.location.href).searchParams.get("token");
      const app = document.getElementById("app");
      let refreshHandle = null;
      let shouldPoll = true;
      let isRefreshing = false;
      let hasRenderedSnapshot = false;

      function stopPolling() {
        shouldPoll = false;
        if (refreshHandle !== null) {
          clearInterval(refreshHandle);
          refreshHandle = null;
        }
      }

      function renderMessage(title, message) {
        app.className = "";
        app.innerHTML =
          '<section class="card hero">' +
          '<p class="eyebrow">BogeyBook Live Round</p>' +
          "<h1>" + title + "</h1>" +
          '<p class="message">' + message + "</p>" +
          "</section>";
      }

      async function refresh() {
        if (isRefreshing) {
          return;
        }

        if (!token) {
          stopPolling();
          renderMessage("Round not available", "Missing round token.");
          return;
        }

        isRefreshing = true;

        try {
          const response = await fetch(
            snapshotURL + "?token=" + encodeURIComponent(token),
            { headers: { accept: "application/json" } }
          );

          const payload = await response.json();
          if (!payload || typeof payload.html !== "string") {
            throw new Error("Snapshot payload was invalid.");
          }

          app.className = "";
          app.innerHTML = payload.html;
          hasRenderedSnapshot = true;

          if (payload.shouldStopPolling) {
            stopPolling();
          }
        } catch (error) {
          if (!hasRenderedSnapshot) {
            renderMessage(
              "Round not available",
              "Temporary connection issue. Try refreshing again in a moment."
            );
          }
        } finally {
          isRefreshing = false;
        }
      }

      async function start() {
        await refresh();
        if (shouldPoll) {
          refreshHandle = setInterval(refresh, 5000);
        }
      }

      start();
    </script>
  </body>
</html>
